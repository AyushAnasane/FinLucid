<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Finlucid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-red-50 min-h-screen flex items-center justify-center" style="font-family: 'Inter', sans-serif;">

  <div class="bg-white rounded-3xl shadow-sm p-10 w-full max-w-md">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-500 mb-1">FINLUCID</h1>
      <h2 class="text-xl font-bold text-gray-900 mb-1">Welcome back</h2>
      <p class="text-gray-400 text-sm">Sign in to track your finances and investments</p>
    </div>

    <a href="/accounts/google/login/?next=/"
      class="flex items-center justify-center gap-3 w-full border border-gray-200 rounded-xl px-6 py-3 text-gray-700 font-semibold hover:border-red-400 hover:text-red-400 transition-all duration-300 mb-4">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
      Continue with Google
    </a>

    <p class="text-center text-gray-400 text-xs mt-6">
      By signing in you agree to our Terms of Service and Privacy Policy.
    </p>
  </div>

</body>
</html>
